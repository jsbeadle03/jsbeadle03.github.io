<body>

  <header class="header">
    <div class="container">
      <a class="brand" href="index.html">
        <img class="logo" src="images/logo.png" alt="Jordan Beadle logo">
        <div class="brand-text">
          <div class="brand-name">Jordan Beadle</div>
          <div class="brand-tag">Producer / Mixing Engineer</div>
        </div>
      </a>

      <nav class="nav">
        <a href="music-projects.html">Music/Projects</a>
        <a href="studio.html">The Studio</a>
        <a class="nav-contact" href="contact.html">Contact</a>
      </nav>

      <div class="clear"></div>
    </div>
  </header>

  <main>
    <div class="section">
      <div class="container">
        <h2>Contact</h2>
        <p>
          Use this form to reach out about mixing, mastering, production, or lessons.
          I usually respond within 24 hours.
        </p>

        <form class="contact-form" action="#" method="post">
          <div class="form-row">
            <label for="fullName">Your Name *</label>
            <input type="text" id="fullName" name="fullName" required>
          </div>

          <div class="form-row">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-row">
            <label for="projectType">Type of Project *</label>
            <select id="projectType" name="projectType" required>
              <option value="">Select one...</option>
              <option value="mixing">Mixing</option>
              <option value="mastering">Mastering</option>
              <option value="production">Production</option>
              <option value="lessons">Lessons</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-row">
            <label for="timeline">Timeline (optional)</label>
            <input type="text" id="timeline" name="timeline" placeholder="Example: 2 weeks, ASAP, flexible">
          </div>

          <div class="form-row">
            <label for="message">Message *</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>

          <div class="form-row">
            <input class="btn" type="submit" value="Send Message">
          </div>
        </form>

        <p class="small-note">
          If you prefer email, you can also message me here:
          <a href="https://mail.google.com/mail/?view=cm&fs=1&to=jsbeadle@asu.edu" target="_blank" rel="noreferrer">
            Send an email
          </a>
        </p>

      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">

      <div class="footer-left">
        <a class="icon-link" href="https://www.instagram.com/jordanbe_dle/" target="_blank" rel="noreferrer">
